<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Bem-vindo! 💜</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Pacifico&display=swap">
    <style>
        :root {
            --lilac-soft: #E6D9F2;
            --lilac-medium: #D4B5F0;
            --purple-light: #B794E6;
            --purple-medium: #9B6DD6;
            --purple-deep: #7B4BC4;
            --purple-dark: #5A2E94;
            --white: #FFFFFF;
            --shadow: rgba(123, 75, 196, 0.15);
            --shadow-strong: rgba(123, 75, 196, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #E6D9F2 0%, #D4B5F0 25%, #B794E6 50%, #9B6DD6 75%, #7B4BC4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Floating decorative elements */
        .decoration {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        .decoration:nth-child(1) {
            width: 80px;
            height: 80px;
            background: var(--lilac-soft);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .decoration:nth-child(2) {
            width: 120px;
            height: 120px;
            background: var(--purple-light);
            top: 70%;
            right: 15%;
            animation-delay: 2s;
        }

        .decoration:nth-child(3) {
            width: 60px;
            height: 60px;
            background: var(--purple-medium);
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        .decoration:nth-child(4) {
            width: 100px;
            height: 100px;
            background: var(--lilac-medium);
            top: 15%;
            right: 25%;
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            25% {
                transform: translateY(-20px) translateX(10px);
            }
            50% {
                transform: translateY(-10px) translateX(-15px);
            }
            75% {
                transform: translateY(-25px) translateX(5px);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px var(--shadow-strong);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--purple-light), var(--purple-deep));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            box-shadow: 0 10px 30px var(--shadow);
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: var(--purple-deep);
            font-size: 2.2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px var(--shadow);
        }

        .subtitle {
            color: var(--purple-medium);
            font-size: 1em;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            color: var(--purple-dark);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .label-icon {
            font-size: 1.2em;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid var(--lilac-medium);
            border-radius: 15px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1em;
            transition: all 0.3s ease;
            background: var(--white);
            color: var(--purple-dark);
        }

        input:focus {
            outline: none;
            border-color: var(--purple-medium);
            box-shadow: 0 0 0 4px rgba(155, 109, 214, 0.1);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: var(--lilac-medium);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3em;
            color: var(--purple-medium);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        input:focus + .input-icon {
            color: var(--purple-deep);
            transform: translateY(-50%) scale(1.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--purple-medium), var(--purple-deep));
            color: var(--white);
            border: none;
            border-radius: 15px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px var(--shadow);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px var(--shadow-strong);
            background: linear-gradient(135deg, var(--purple-deep), var(--purple-dark));
        }

        button:active {
            transform: translateY(-1px);
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: var(--purple-medium);
            font-size: 0.9em;
        }

        .footer-text a {
            color: var(--purple-deep);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer-text a:hover {
            color: var(--purple-dark);
            text-decoration: underline;
        }

        /* Success message */
        .success-message {
            background: linear-gradient(135deg, var(--lilac-soft), var(--lilac-medium));
            border: 2px solid var(--purple-light);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-message.show {
            display: flex;
        }

        .success-icon {
            font-size: 1.5em;
        }

        .success-text {
            color: var(--purple-dark);
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 1.8em;
            }

            .header-icon {
                width: 70px;
                height: 70px;
                font-size: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="decoration"></div>
    <div class="decoration"></div>
    <div class="decoration"></div>
    <div class="decoration"></div>

    <div class="container">
        <div class="header">
            <div class="header-icon">✨</div>
            <h1>Bem-vindo!</h1>
            <p class="subtitle">Crie sua conta e junte-se a nós 💜</p>
        </div>

        <div class="success-message" id="successMessage">
            <span class="success-icon">🎉</span>
            <span class="success-text">Cadastro realizado com sucesso!</span>
        </div>

        <form id="cadastroForm">
            <div class="form-group">
                <label>
                    <span class="label-icon">👤</span>
                    Nome completo
                </label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="nome" 
                        placeholder="Digite seu nome..." 
                        required
                    >
                    <span class="input-icon">🌸</span>
                </div>
            </div>

            <div class="form-group">
                <label>
                    <span class="label-icon">📧</span>
                    E-mail
                </label>
                <div class="input-wrapper">
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="seu@email.com" 
                        required
                    >
                    <span class="input-icon">💌</span>
                </div>
            </div>

            <div class="form-group">
                <label>
                    <span class="label-icon">🔒</span>
                    Senha
                </label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="senha" 
                        placeholder="Crie uma senha segura..." 
                        required
                        minlength="6"
                    >
                    <span class="input-icon">🔑</span>
                </div>
            </div>

            <button type="submit">
                <span>Criar minha conta</span>
                <span>🚀</span>
            </button>
        </form>

        <p class="footer-text">
            Já tem uma conta? <a href="#">Fazer login</a>
        </p>
    </div>
   <script src="../js/script.js"></script>

</html>
